<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
</head>
<body>
    <div class="container">
        <div class="row mb-3 mt-3 justify-content-md-center">
            <div id="username"></div>
            <button id="join" class="btn btn-primary col-1">Join</button>
            <button id="hangup" class="col-1" class="btn btn-primary">Hangup</button>
            <div id="answer" class="col"></div>
        </div>
        <div id="videoFrames">
            <div id="video-wrapper">
                <video class="videoPlayer" id="localVideo" autoplay playsinline controls></video>
                <video class="videoPlayer" id="remoteVideo" autoplay playsinline controls></video>
            </div>
            <div id="waiting" class="btn btn-warning">Waiting for answer...</div>
            
        </div>
    </div>
</body>
<script src="/socket.io/socket.io.js"></script>
<script src='client.js'></script>
<script src='socketListeners.js'></script>
</html>
